name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # v4 अपडेट किया गया

    - name: set up JDK 17
      uses: actions/setup-java@v4 # v4 अपडेट किया गया
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # यहाँ v4 करना ज़रूरी था
      with:
        name: GHH-Ultimate-OS-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
